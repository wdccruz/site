<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
    :root {
        --primary-color: #0f172a; /* Azul Marinho Dark */
        --accent-color: #f59e0b;  /* Dourado/Âmbar */
        --whatsapp-color: #25d366;
    }

    body { font-family: 'Inter', sans-serif; }

    /* --- BOTÃO WHATSAPP PREMIUM --- */
    .whatsapp-float {
        position: fixed;
        width: 65px;
        height: 65px;
        bottom: 30px;
        right: 30px;
        background-color: var(--whatsapp-color);
        color: #FFF;
        border-radius: 50px;
        text-align: center;
        font-size: 30px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        transition: all 0.3s ease;
        border: 2px solid rgba(255,255,255,0.2);
    }

    /* Efeito de Ondas (Pulso) */
    .whatsapp-float::before {
        content: '';
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background-color: var(--whatsapp-color);
        opacity: 0.7;
        z-index: -1;
        animation: pulse-border 2s infinite;
    }

    .whatsapp-float:hover {
        transform: translateY(-5px) scale(1.05);
        background-color: #20ba5a;
        color: white;
    }

    /* Tooltip "Especialista Online" */
    .whatsapp-tooltip {
        position: absolute;
        right: 80px;
        background: white;
        color: #333;
        padding: 8px 15px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        white-space: nowrap;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s;
    }

    .whatsapp-float:hover .whatsapp-tooltip {
        opacity: 1;
    }

    @keyframes pulse-border {
        0% { transform: scale(1); opacity: 0.7; }
        100% { transform: scale(1.6); opacity: 0; }
    }

    /* --- MELHORIAS NO CONTEÚDO --- */
    .hero {
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        color: white;
        padding: 80px 20px;
        text-align: center;
    }

    .premium-badge {
        display: inline-block;
        background: rgba(245, 158, 11, 0.1);
        color: var(--accent-color);
        padding: 5px 15px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 15px;
        border: 1px solid var(--accent-color);
    }

    h1 { font-weight: 700; font-size: 2.5rem; margin-bottom: 10px; }
    
    .cta-button {
        background: var(--accent-color);
        color: #000 !important;
        font-weight: bold;
        padding: 15px 35px;
        border-radius: 5px;
        text-transform: uppercase;
        transition: 0.3s;
    }
</style>
