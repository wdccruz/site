<style>
:root {
    --bg: #0E0E0D;
    --card: #151514;
    --text: #FAFAF8;
    --muted: #9B9A94;
    --accent: #C9920A;
    --green: #25D366;
    --glass: rgba(255, 255, 255, 0.03);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
    line-height: 1.6;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 40px 24px;
}

.premium-tag {
    display: inline-block;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 6px 14px;
    border-radius: 4px;
    margin-bottom: 24px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
}

.hero { text-align: left; padding-bottom: 40px; }
.hero h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(32px, 7vw, 56px);
    line-height: 1.1;
    margin-bottom: 10px;
}
.hero h1 em { color: var(--accent); font-style: italic; }
.hero .focus-text {
    color: var(--text);
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 15px;
    display: block;
}
.hero .sub {
    color: var(--muted);
    font-size: 18px;
    margin-bottom: 30px;
    max-width: 700px;
}

.btn-cta {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: var(--accent);
    color: #000;
    padding: 16px 32px;
    border-radius: 4px;
    font-weight: 600;
    text-decoration: none;
    font-size: 16px;
    transition: 0.3s;
    margin-bottom: 5px;
}
.btn-cta:hover { opacity: 0.9; transform: translateY(-2px); }

.btn-microcopy {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 25px;
    font-style: italic;
}

.symptoms-box {
    background: var(--card);
    border: 1px solid var(--glass);
    padding: 30px;
    border-radius: 4px;
    margin-bottom: 20px;
}
.symptoms-title {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    margin-bottom: 20px;
    font-weight: 700;
}
.symptoms-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
}
.symptom-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 16px;
    color: var(--text);
}
.symptom-item i { color: var(--accent); font-size: 12px; }

.safety-reinforcement {
    font-size: 14px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 40px;
}

.price-card {
    background: var(--card);
    border: 1px solid var(--glass);
    padding: 30px;
    border-radius: 4px;
    text-align: center;
    margin: 40px 0;
}
.price-value { font-size: 28px; font-weight: 700; }
.price-info { color: var(--accent); font-weight: 600; font-size: 14px; }
.price-desc { color: var(--muted); }

.footer-main {
    margin-top: 60px;
    padding: 40px 0;
    border-top: 1px solid var(--glass);
    text-align: center;
    color: var(--muted);
    font-size: 12px;
}
</style>
</head>

<body>

<div class="container">
    <h1>⚡ Diagnóstico Elétrico Profissional</h1>
    <p>Atendimento rápido em Porto Alegre e região.</p>
</div>

</body>
